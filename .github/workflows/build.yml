name: Build Windows Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        # We need to include customtkinter assets
        # Find where customtkinter is installed
        $ctk_path = python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))"
        pyinstaller --noconsole --onefile --name "AcreetionOS-AutoPoster" --add-data "$($ctk_path);customtkinter" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AcreetionOS-AutoPoster-EXE
        path: dist/AcreetionOS-AutoPoster.exe
