stages:
  - build

build_windows:
  stage: build
  image: mcr.microsoft.com/windows/servercore:ltsc2022
  tags:
    - windows
  script:
    - powershell -Command "Invoke-WebRequest -Uri https://www.python.org/ftp/python/3.13.0/python-3.13.0-amd64.exe -OutFile python-installer.exe"
    - powershell -Command "Start-Process python-installer.exe -ArgumentList '/quiet InstallAllUsers=1 PrependPath=1' -Wait"
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - |
      $ctk_path = python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))"
      pyinstaller --noconsole --onefile --name "AcreetionOS-AutoPoster" --add-data "$($ctk_path);customtkinter" main.py
  artifacts:
    paths:
      - dist/AcreetionOS-AutoPoster.exe
    expire_in: 1 week
  only:
    - main
